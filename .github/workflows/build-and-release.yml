name: Run tests and release npm package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile*'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile*'
  release:
    types: [published]

jobs:
  # Install dependencies, run tests and try to build
  test:
    name: 'Build and test on Node v${{ matrix.node }}'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [26, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Run tests (lint + build)
        run: npm test
      - name: Run --help
        run: npm run help

  # Release to NPM only on manual release creation
  npm-release:
    runs-on: ubuntu-latest
    name: NPM Release
    if: github.event_name == 'release'
    needs: [test]
    permissions:
      id-token: write
      contents: read
      packages: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: 'https://registry.npmjs.org'
      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Set package version
        run: npm version ${{ steps.get_version.outputs.version }} --no-git-tag-version
      - name: Install dependencies
        run: npm ci
      - name: Build library
        run: npm run build

      - name: Publish to NPM
        run: npm publish --provenance --tag ${{ github.event.release.prerelease && 'beta' || 'latest' }}
      - name: Setup node for GitHub Package Registry
        uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: 'https://npm.pkg.github.com'
          scope: 'svrooij'
      - name: Publish to GitHub Package Registry
        run: |
          sed -i 's+"name": "sonos2mqtt"+"name": "@svrooij/sonos2mqtt"+g' package**.json
          npm publish --access public --provenance --tag ${{ github.event.release.prerelease && 'beta' || 'latest' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Release container after npm release
  container-release:
    runs-on: ubuntu-latest
    name: Container release
    needs: [npm-release]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU (multi platform)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/svrooij/sonos2mqtt
          tags: |
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
            type=raw,value=beta,enable=${{ github.event.release.prerelease == true }}
            type=raw,value=${{ steps.get_version.outputs.version }}

      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.npm
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            BUILD_VERSION=${{ steps.get_version.outputs.version }}
            VCS_REF=${{ github.sha }}

  # Append artifact links to the release notes after publishing
  update-release-notes:
    runs-on: ubuntu-latest
    name: Update release notes
    needs: [npm-release, container-release]
    permissions:
      contents: write
    steps:
      - name: Append release artifacts to notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.npm-release.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json body --jq '.body' > /tmp/release_notes.md
          if ! grep -q '## Released artifacts' /tmp/release_notes.md; then
            printf '\n## Released artifacts\n\n- [Docker container](https://github.com/%s/pkgs/container/sonos2mqtt/?tag=%s): `docker pull ghcr.io/svrooij/sonos2mqtt:%s`\n- [NPM package](https://www.npmjs.com/package/sonos2mqtt/v/%s)\n\nThese packages were published using [this](%s) action\n' \
              "$GITHUB_REPOSITORY" "$VERSION" "$VERSION" "$VERSION" "$RUN_URL" >> /tmp/release_notes.md
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file /tmp/release_notes.md
          fi
