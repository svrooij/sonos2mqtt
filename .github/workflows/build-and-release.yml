name: Run tests and release npm package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile*'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile*'
  release:
    types: [published]

jobs:
  # Install dependencies, run tests and try to build
  test:
    name: 'Build and test on Node v${{ matrix.node }}'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [26, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Run tests (lint + build)
        run: npm test
      - name: Run --help
        run: npm run help

  # Release to NPM only on manual release creation
  npm-release:
    runs-on: ubuntu-latest
    name: NPM Release
    if: github.event_name == 'release'
    needs: [test]
    permissions:
      id-token: write
      contents: read
      packages: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Build library
        run: npm run build
      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Set package version
        run: npm version ${{ steps.get_version.outputs.version }} --no-git-tag-version
      - name: Publish to NPM
        run: |
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            npm publish --provenance --tag beta
          else
            npm publish --provenance --tag latest
          fi
      - name: Setup node for GitHub Package Registry
        uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: 'https://npm.pkg.github.com'
          scope: 'svrooij'
      - name: Publish to GitHub Package Registry
        run: |
          sed -i 's+"name": "sonos2mqtt"+"name": "@svrooij/sonos2mqtt"+g' package**.json
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            npm publish --tag beta
          else
            npm publish --tag latest
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Release container after npm release
  container-release:
    runs-on: ubuntu-latest
    name: Container release
    needs: [npm-release]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU (multi platform)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/svrooij/sonos2mqtt
          tags: |
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
            type=raw,value=beta,enable=${{ github.event.release.prerelease == true }}
            type=raw,value=${{ steps.get_version.outputs.version }}

      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.npm
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            BUILD_VERSION=${{ steps.get_version.outputs.version }}
            VCS_REF=${{ github.sha }}
