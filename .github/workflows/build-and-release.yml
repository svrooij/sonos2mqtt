name: Run tests and release npm package

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - development
      - beta
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile*'
  pull_request:
    branches:
      - master
      - main
      - beta
      - feature/2025-update
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile*'
  release:
    types: [published]

jobs:
  # Install dependencies, run tests and try to build
  test:
    name: 'Build and test on Node v${{ matrix.node }}'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [24,26]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Run tests (lint + build)
        run: npm test
      - name: Run --help
        run: npm run help

  # Release to NPM only on manual release creation
  npm-release:
    runs-on: ubuntu-latest
    name: NPM Release
    if: github.event_name == 'release'
    needs: [test]
    permissions:
      id-token: write
      contents: read
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Build library
        run: npm run build
      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Set package version
        run: npm version ${{ steps.get_version.outputs.version }} --no-git-tag-version
      - name: Publish to NPM
        run: |
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            npm publish --provenance --tag beta
          else
            npm publish --provenance
          fi
      - name: Setup node for GitHub Package Registry
        uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: 'https://npm.pkg.github.com'
          scope: 'svrooij'
      - name: Publish to GitHub Package Registry
        run: |
          sed -i 's+"name": "sonos2mqtt"+"name": "@svrooij/sonos2mqtt"+g' package**.json
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            npm publish --tag beta
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Release container after npm release
  container-release:
    runs-on: ubuntu-latest
    name: Container release
    needs: [npm-release]
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU (multi platform)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish container as latest
        if: github.event.release.prerelease == false
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/arm/v7 \
            --push \
            -f ./Dockerfile.npm \
            -t $GITHUB_REPOSITORY:latest \
            -t $GITHUB_REPOSITORY:${{ needs.npm-release.outputs.version }} \
            -t ghcr.io/svrooij/sonos2mqtt:latest \
            -t ghcr.io/svrooij/sonos2mqtt:${{ needs.npm-release.outputs.version }} \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg BUILD_VERSION=${{ needs.npm-release.outputs.version }} \
            --build-arg VSC_REF=$(echo ${GITHUB_SHA} | cut -c1-8) \
            .

      - name: Publish container as beta
        if: github.event.release.prerelease == true
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/arm/v7 \
            --push \
            -f ./Dockerfile.npm \
            -t $GITHUB_REPOSITORY:beta \
            -t $GITHUB_REPOSITORY:${{ needs.npm-release.outputs.version }} \
            -t ghcr.io/svrooij/sonos2mqtt:beta \
            -t ghcr.io/svrooij/sonos2mqtt:${{ needs.npm-release.outputs.version }} \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg BUILD_VERSION=${{ needs.npm-release.outputs.version }} \
            --build-arg VSC_REF=$(echo ${GITHUB_SHA} | cut -c1-8) \
            .
