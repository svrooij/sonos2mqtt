# --------------------------------------------------
# docker-compose.yml to enable documentation live reload using docker
# see https://svrooij.io/2020/12/31/github-pages-live-reload/
# --------------------------------------------------

services:
  jekyll:
    volumes:
        # - './vendor:/usr/local/bundle'
        - './:/srv/jekyll'
    ports:
        - '4000:4000'
        - '35729:35729'
    image: jekyll/jekyll
    command: bundle install && bundle exec jekyll serve --livereload --force_polling --incremental -b --host 0.0.0.0 /
